services:
  - type: web
    name: nestjs-auth-cms
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 9999
      - key: APP_URL
        value: https://task-mail-be.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_DOMAIN
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://task-mail-be.onrender.com/mail-accounts/google/callback
      - key: GOOGLE_OAUTH_LOGIN_CALLBACK_URL
        value: https://task-mail-be.onrender.com/auth/google/callback
      - key: FRONTEND_URL
        sync: false
