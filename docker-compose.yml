services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${PORT:-9999}:9999'
    env_file:
      - .env
    environment:
      PORT: 9999
      DATABASE_URL: postgresql://postgres:password@db:5432/cms_db?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cms_db
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
